name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Host compile-check: the tauri-plugin builds, and the mobile shell links against
  # pulsar-core (git) — a fast gate without the full Android/iOS toolchain. The real
  # device builds run in release.yml. pulsar-core/-relay come from git; vigem-client
  # (Windows, cfg-gated) via the workspace patch.
  rust:
    name: Rust · compile check (host)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (tauri host build + gilrs)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential libudev-dev librsvg2-dev \
            libxdo-dev libssl-dev libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt (advisory)
        continue-on-error: true
        run: cargo fmt --all --check
      - name: clippy (advisory)
        continue-on-error: true
        run: cargo clippy --all-targets --locked
      - name: Check plugin + mobile shell
        run: |
          cargo check -p tauri-plugin-pulsar-video --locked
          cargo check -p pulsar-mobile --locked
